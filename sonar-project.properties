sonar.projectKey=KevinColoma_RM-Restaurant
sonar.organization=kevincoloma
sonar.host.url=https://sonarcloud.io

sonar.sources=backend,frontend/src
sonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**,**/*.test.js,**/*.spec.js,**/tests/**,backend/public/assets/plugins/**,backend/public/assets/js/*.min.js,.github/**,docs/**,README.md,sonar-project.properties,backend/public/uploads/**

sonar.coverage.exclusions=\
  **/branchController.js,**/dashController.js,**/datereportController.js,\
  **/exportController.js,**/profileController.js,**/purchaseController.js,\
  **/reportController.js,**/settingsController.js,**/supplierController.js,\
  **/auditController.js,**/restaurantController.js,**/menuController.js,\
  **/orderController.js,**/expenseController.js,**/csv.js,**/pdf.js,\
  **/roleMiddleware.js,**/frontend/src/pages/**,**/frontend/src/components/**,\
  **/frontend/src/lib/auth.js

sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info
sonar.testExecutionReportPaths=backend/coverage/test-report.xml,frontend/coverage/test-report.xml
