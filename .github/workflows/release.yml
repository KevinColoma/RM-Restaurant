# =============================================================================
# Release Pipeline (GitHub Release)
# =============================================================================
# Este pipeline se ejecuta al publicar un Release en GitHub.
# Flujo: Build (tests) → SonarCloud → Deploy a Render
# =============================================================================

name: Release

# ── Disparadores ──────────────────────────────────────────────────────────────
on:
  release:
    types: [published]           # Cuando se publica un release

# ── Shell ────────────────────────────────────────────────────────────────────
# Activa pipefail: sin esto, "npm test | tee log" devuelve el exit code de tee
# y un test fallando no detendria la release.
defaults:
  run:
    shell: bash

# ── Variables de entorno globales ────────────────────────────────────────────
env:
  TELEGRAM_PREFIX: |
    🏷 *${{ github.repository }}*
    🏷️ Tag: \`${{ github.event.release.tag_name }}\`
    📛 Nombre: ${{ github.event.release.name }}
    👤 Autor: ${{ github.actor }}
    🔗 [Ver release](${{ github.event.release.html_url }})

jobs:
  # ── Job 1: Build + Tests ─────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: cd backend && npm ci
      # Ejecuta tests backend con cobertura para validar la release
      - run: cd backend && npm test -- --coverage 2>&1 | tee test-release.log
      - name: Notify build result
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            ✅ *Build completado*
            📦 Tests backend: OK
            📌 Siguiente: Análisis SonarCloud + Deploy

  # ── Job 2: SonarCloud (Quality Gate) ─────────────────────────────────────
  sonarcloud:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Análisis de calidad con SonarCloud
      - uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # Consulta métricas de SonarCloud vía API para incluirlas en la notificación
      - name: Fetch SonarCloud metrics
        id: sonar-metrics
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/measures/component?component=KevinColoma_RM-Restaurant&metricKeys=alert_status,coverage,bugs,code_smells,vulnerabilities,security_hotspots" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          measures = {m['metric']: m['value'] for m in d.get('component',{}).get('measures',[])}
          qg = '✅ Passed' if measures.get('alert_status') == 'OK' else '❌ Failed'
          print(f'SONAR_QG={qg}')
          print(f'SONAR_COV={measures.get(\"coverage\",\"N/A\")}%')
          print(f'SONAR_BUGS={measures.get(\"bugs\",\"?\")}')
          print(f'SONAR_SMELLS={measures.get(\"code_smells\",\"?\")}')
          print(f'SONAR_VULNS={measures.get(\"vulnerabilities\",\"?\")}')
          print(f'SONAR_HOTSPOTS={measures.get(\"security_hotspots\",\"?\")}')
          " >> $GITHUB_ENV
      - name: Notify SonarCloud result
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            ${{ env.SONAR_QG }}
            📈 Coverage: ${{ env.SONAR_COV }}
            🐛 Bugs: ${{ env.SONAR_BUGS }}
            💨 Code Smells: ${{ env.SONAR_SMELLS }}
            🔒 Vulnerabilities: ${{ env.SONAR_VULNS }}
            ⚡ Hotspots: ${{ env.SONAR_HOTSPOTS }}
            ─────────────────────
            🔗 [Ver reporte en SonarCloud](https://sonarcloud.io/project/overview?id=KevinColoma_RM-Restaurant)
            📌 Siguiente: Deploy a Render

  # ── Job 3: Deploy a Render ───────────────────────────────────────────────
  deploy:
    needs: [build, sonarcloud]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Despliega en Render vía API REST
      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"
      - name: Notify deploy
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            🚀 *Release desplegado en Render*
            📦 Versión: \`${{ github.event.release.tag_name }}\`
            🌐 Aplicación actualizada en producción.
            📌 [Deploy en Render](https://dashboard.render.com/web/${{ secrets.RENDER_SERVICE_ID }})

  # ── Job 4: Notificación de éxito ─────────────────────────────────────────
  notify-success:
    if: success()
    needs: [build, sonarcloud, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            🎉 *Release completado exitosamente*
            ✅ Build · ✅ SonarCloud · ✅ Deploy
            La nueva versión \`${{ github.event.release.tag_name }}\` ya está en producción.

  # ── Job 5: Notificación de fallo ─────────────────────────────────────────
  notify-failure:
    if: failure()
    needs: [build, sonarcloud, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ *Release Falló — ${{ github.repository }}*
            🏷️ Tag: \`${{ github.event.release.tag_name }}\`
            📛 Nombre: ${{ github.event.release.name }}
            👤 Autor: ${{ github.actor }}
            ─────────────────────
            🔴 El release pipeline no se completó.
            ⚠️ *Posibles causas:*
            • Tests fallaron en build
            • SonarCloud no superó Quality Gate
            • Error en deploy a Render
            ─────────────────────
            👨‍💻 Revisa los logs y corrige.
            🔗 [Ver workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
