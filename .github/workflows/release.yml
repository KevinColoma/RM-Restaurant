name: Release

on:
  release:
    types: [published]

env:
  TELEGRAM_PREFIX: |
    🏷 *${{ github.repository }}*
    🏷️ Tag: \`${{ github.event.release.tag_name }}\`
    📛 Nombre: ${{ github.event.release.name }}
    👤 Autor: ${{ github.actor }}
    🔗 [Ver release](${{ github.event.release.html_url }})

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd backend && npm ci
      - run: cd backend && npm test -- --coverage 2>&1 | tee test-release.log
      - name: Notify build result
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            ✅ *Build completado*
            📦 Tests backend: OK
            📌 Siguiente: Análisis SonarCloud + Deploy

  sonarcloud:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Notify SonarCloud result
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            ✅ *SonarCloud completado*
            🔍 Quality Gate verificado
            📌 Siguiente: Deploy a Render

  deploy:
    needs: [build, sonarcloud]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"
      - name: Notify deploy
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            🚀 *Release desplegado en Render*
            📦 Versión: \`${{ github.event.release.tag_name }}\`
            🌐 Aplicación actualizada en producción.
            📌 [Deploy en Render](https://dashboard.render.com/web/${{ secrets.RENDER_SERVICE_ID }})

  notify-success:
    if: success()
    needs: [build, sonarcloud, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            🎉 *Release completado exitosamente*
            ✅ Build · ✅ SonarCloud · ✅ Deploy
            La nueva versión \`${{ github.event.release.tag_name }}\` ya está en producción.

  notify-failure:
    if: failure()
    needs: [build, sonarcloud, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ❌ *Release Falló — ${{ github.repository }}*
            🏷️ Tag: \`${{ github.event.release.tag_name }}\`
            📛 Nombre: ${{ github.event.release.name }}
            👤 Autor: ${{ github.actor }}
            ─────────────────────
            🔴 El release pipeline no se completó.
            ⚠️ *Posibles causas:*
            • Tests fallaron en build
            • SonarCloud no superó Quality Gate
            • Error en deploy a Render
            ─────────────────────
            👨‍💻 Revisa los logs y corrige.
            🔗 [Ver workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
