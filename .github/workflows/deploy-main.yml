# =============================================================================
# Deploy a Producción (rama main)
# =============================================================================
# Este pipeline se ejecuta al hacer push o merge a main.
# Flujo: CodeQL → Deploy a Render
# =============================================================================

name: Deploy to Production

# ── Disparadores ──────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]             # Push directo a main
  pull_request:
    types: [closed]              # PR mergeado a main
    branches: [main]
  workflow_dispatch:             # Ejecución manual

# ── Variables de entorno globales ────────────────────────────────────────────
env:
  TELEGRAM_PREFIX: |
    🏷 *${{ github.repository }}*
    🌿 Rama: \`main\`
    📝 \`${{ github.event.head_commit.message || 'N/A' }}\`
    👤 Autor: ${{ github.actor }}
    🔗 [Ver commit](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

jobs:
  # ── Job 1: CodeQL (Análisis de seguridad en main) ─────────────────────────
  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
      - name: Notify CodeQL result
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            ✅ *CodeQL en main completado*
            🔒 Sin vulnerabilidades críticas
            📌 Siguiente: Deploy a Render

  # ── Job 2: Deploy a Render ───────────────────────────────────────────────
  deploy:
    needs: codeql
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Dispara el deploy en Render vía API REST
      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"
      - name: Wait for deploy
        run: sleep 5
      # Consulta el estado del deploy para mostrarlo en la notificación
      - name: Check deploy status
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          STATUS=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys?limit=1" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0].get('status','unknown') if d else 'unknown')" 2>/dev/null || echo "unknown")
          echo "Deploy status: $STATUS"
          echo "DEPLOY_STATUS=$STATUS" >> $GITHUB_ENV
      - name: Notify deploy result
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            🚀 *Deploy a Producción*
            ${{ env.DEPLOY_STATUS == 'live' && '✅ Deploy completado y sirviendo tráfico.' || '⚠️ Deploy iniciado — verifica el dashboard.' }}
            🔍 Estado: \`${{ env.DEPLOY_STATUS || 'desconocido' }}\`
            📌 [Dashboard Render](https://dashboard.render.com/web/${{ secrets.RENDER_SERVICE_ID }})
            📌 [Ver workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  # ── Job 3: Notificación de fallo ─────────────────────────────────────────
  notify-failure:
    if: failure()
    needs: [codeql, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ *Deploy Falló — ${{ github.repository }}*
            🌿 Rama: \`main\`
            👤 Autor: ${{ github.actor }}
            ─────────────────────
            🔴 El despliegue a producción no se completó.
            ⚠️ *Posibles causas:*
            • CodeQL detectó vulnerabilidades
            • Error en la API de Render
            • Problema de configuración
            ─────────────────────
            👨‍💻 Revisa los logs y corrige.
            🔗 [Ver workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
