name: CI

on:
  push:
    branches: [dev, test]
  pull_request:
    branches: [dev, test]
  workflow_dispatch:

env:
  TELEGRAM_PREFIX: |
    🏷 *${{ github.repository }}*
    🌿 Rama: \`${{ github.ref_name }}\`
    📝 \`${{ github.event.head_commit.message || 'N/A' }}\`
    👤 Autor: ${{ github.actor }}
    🔗 [Ver commit](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npx eslint . 2>&1 | tee lint-backend.log
      - run: cd frontend && npm ci
      - run: cd frontend && npx eslint src/ 2>&1 | tee lint-frontend.log
      - name: Notify lint result
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            ✅ *Lint completado*
            📁 backend: `eslint .`
            📁 frontend: `eslint src/`
            Sin errores de lint.
            📌 Siguiente: Tests backend + frontend + CodeQL

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd backend && npm ci
      - run: cd backend && npm test -- --coverage 2>&1 | tee test-backend.log
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: backend/coverage/
      - name: Notify backend test result
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            ✅ *Tests Backend OK*
            📦 Suites: `{{ steps.test-results.outputs.suites }}`
            📊 Cobertura global
            📌 Siguiente: Frontend tests + CodeQL

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd frontend && npm ci
      - run: cd frontend && npm test 2>&1 | tee test-frontend.log
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/
      - name: Notify frontend test result
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            ✅ *Tests Frontend OK*
            📦 Tests: todos pasaron
            📌 Siguiente: CodeQL y SonarCloud (solo en test)

  sonarcloud:
    if: github.ref_name == 'test'
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: coverage-backend
          path: backend/coverage/
      - uses: actions/download-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/
      - name: Fix lcov paths for SonarCloud
        run: |
          sed -i 's|^SF:|SF:backend/|' backend/coverage/lcov.info
          sed -i 's|^SF:|SF:frontend/|' frontend/coverage/lcov.info
      - uses: sonarsource/sonarcloud-github-action@master
        with:
          qualityGateWait: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Notify SonarCloud result
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            ✅ *SonarCloud — Quality Gate superado*
            🔍 Análisis completo en SonarCloud
            📌 Siguiente: Auto-merge a main + Deploy

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
      - name: Notify CodeQL result
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            ✅ *CodeQL completado*
            🔒 Análisis de seguridad: sin vulnerabilidades críticas
            📌 Siguiente: ${{ github.ref_name == 'dev' && 'Sync a test' || 'Auto-merge a main + Deploy' }}

  sync-to-test:
    if: success() && github.ref_name == 'dev'
    needs: [lint, test-backend, test-frontend, codeql]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to test
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git push origin HEAD:test
      - name: Trigger CI on test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run ci-pr.yml --ref test
      - name: Notify sync to test
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            🔄 *Sync: dev → test*
            Código promovido de \`dev\` a \`test\`
            Se disparó CI en \`test\` para validación final.
            📌 Pendiente: SonarCloud + Auto-merge a main

  auto-merge:
    if: success() && github.ref_name == 'test'
    needs: [lint, test-backend, test-frontend, sonarcloud, codeql]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push test → main
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git push origin HEAD:main
      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"
      - name: Notify auto-merge and deploy
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            🚀 *Auto-merge + Deploy exitoso*
            📦 \`test\` → \`main\` mergeado
            🌐 Desplegando en Render...
            📌 Siguiente: Notificación de deploy

  notify-success:
    if: success()
    needs: [lint, test-backend, test-frontend, codeql]
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            ${{ github.ref_name == 'dev'
            && '🟢 *Pipeline Dev completado exitosamente*
            ✅ Lint · ✅ Tests Backend · ✅ Tests Frontend · ✅ CodeQL
            🔄 Sincronizando a \`test\`...'
            || '🟢 *Pipeline Test completado exitosamente*
            ✅ Lint · ✅ Tests Backend · ✅ Tests Frontend · ✅ SonarCloud · ✅ CodeQL
            🚀 Mergeando a \`main\` + Desplegando en Render...' }}

  notify-failure:
    if: failure()
    needs: [lint, test-backend, test-frontend, codeql]
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ❌ *Pipeline Bloqueado — ${{ github.repository }}*
            🌿 Rama: \`${{ github.ref_name }}\`
            👤 Autor: ${{ github.actor }}
            ─────────────────────
            🔴 El pipeline se detuvo en \`${{ github.ref_name }}\`
            🚫 No se sincroniza a la siguiente fase.
            ─────────────────────
            ⚠️ *Posibles causas:*
            • Error de lint en backend o frontend
            • Tests fallidos
            • CodeQL detectó vulnerabilidades
            ─────────────────────
            👨‍💻 Revisa los logs y corrige antes de reintentar.
            🔗 [Ver workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  notify-blocked:
    if: cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ⏹ *Pipeline cancelado — ${{ github.repository }}*
            🌿 Rama: \`${{ github.ref_name }}\`
            👤 Autor: ${{ github.actor }}
            El pipeline fue cancelado manualmente.
