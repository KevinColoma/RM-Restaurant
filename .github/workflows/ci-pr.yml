name: CI

on:
  push:
    branches: [test]
  pull_request:
    branches: [dev, test]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npx eslint .
      - run: cd frontend && npm ci
      - run: cd frontend && npx eslint src/

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd backend && npm ci
      - run: cd backend && npm test -- --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: backend/coverage/

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd frontend && npm ci
      - run: cd frontend && npm test
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/

  sonarcloud:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: coverage-backend
          path: backend/coverage/
      - uses: actions/download-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/
      - uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  auto-merge:
    if: success() && github.ref_name == 'test'
    needs: [lint, test-backend, test-frontend, sonarcloud, codeql]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create PR and merge test → main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create --base main --head test \
            --title "Auto-merge $(date +'%Y-%m-%d %H:%M')" \
            --body "CI pasó en test. Merge automático a main." || true
          PR_NUMBER=$(gh pr list --base main --head test --state open --json number -q '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr merge "$PR_NUMBER" --squash
          fi
      - name: Trigger deploy on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy-main.yml --ref test

  notify-success:
    if: success()
    needs: [lint, test-backend, test-frontend, sonarcloud, codeql, auto-merge]
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ✅ *CI Exitoso — ${{ github.repository }}*
            Rama: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            Autor: ${{ github.actor }}
            Workflow: ${{ github.workflow }}
            [Ver detalles](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  notify-failure:
    if: failure()
    needs: [lint, test-backend, test-frontend, sonarcloud, codeql, auto-merge]
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ❌ *CI Falló — ${{ github.repository }}*
            Rama: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            Autor: ${{ github.actor }}
            Workflow: ${{ github.workflow }}
            [Ver detalles](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
