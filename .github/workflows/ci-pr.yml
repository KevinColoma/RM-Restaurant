name: CI

on:
  push:
    branches: [dev, test]
  pull_request:
    branches: [dev, test]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npx eslint .
      - run: cd frontend && npm ci
      - run: cd frontend && npx eslint src/

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd backend && npm ci
      - run: cd backend && npm test -- --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: backend/coverage/

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd frontend && npm ci
      - run: cd frontend && npm test
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/

  sonarcloud:
    if: github.ref_name == 'test'
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: coverage-backend
          path: backend/coverage/
      - uses: actions/download-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/
      - name: Fix lcov paths for SonarCloud
        run: |
          sed -i 's|^SF:|SF:backend/|' backend/coverage/lcov.info
          sed -i 's|^SF:|SF:frontend/|' frontend/coverage/lcov.info
      - uses: sonarsource/sonarcloud-github-action@master
        with:
          qualityGateWait: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  sync-to-test:
    if: success() && github.ref_name == 'dev'
    needs: [lint, test-backend, test-frontend, codeql]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to test
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git push origin HEAD:test
      - name: Trigger CI on test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run ci-pr.yml --ref test

  auto-merge:
    if: success() && github.ref_name == 'test'
    needs: [lint, test-backend, test-frontend, sonarcloud, codeql]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push test → main
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git push origin HEAD:main
      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"

  notify-success:
    if: success()
    needs: [lint, test-backend, test-frontend, sonarcloud, codeql, sync-to-test, auto-merge]
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ github.ref_name == 'dev' && '🟢' || '🟢' }} *CI ${{ github.ref_name == 'dev' && 'Dev' || 'Test' }} Exitoso — ${{ github.repository }}*
            Rama: `${{ github.ref_name }}`
            Commit: [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            Autor: ${{ github.actor }}
            Jobs: ✅ lint · ✅ test-backend · ✅ test-frontend ${{ github.ref_name == 'test' && '· ✅ sonarcloud' || '' }} · ✅ codeql
            ${{ github.ref_name == 'dev' && '🔄 Sincronizando a test...' || '' }}
            ${{ github.ref_name == 'test' && '🚀 Mergeado a main + Deploy a Render' || '' }}
            [Ver workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  notify-failure:
    if: failure()
    needs: [lint, test-backend, test-frontend, sonarcloud, codeql, sync-to-test, auto-merge]
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ❌ *CI ${{ github.ref_name == 'dev' && 'Dev' || 'Test' }} Falló — ${{ github.repository }}*
            Rama: `${{ github.ref_name }}`
            Commit: [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            Autor: ${{ github.actor }}
            🔴 Se detuvo el pipeline. No pasa a la siguiente fase.
            [Ver workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
