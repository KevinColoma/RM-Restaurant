# =============================================================================
# CI - Pipeline de Integración Continua (ramas dev y test)
# =============================================================================
# Este pipeline se ejecuta al hacer push o PR a dev/test.
# Flujo: lint → tests → CodeQL → sync a test / auto-merge a main + deploy Render
# =============================================================================

name: CI

# ── Disparadores ──────────────────────────────────────────────────────────────
on:
  push:
    branches: [dev, test]
  pull_request:
    branches: [dev, test]
  workflow_dispatch:          # Permite ejecución manual desde GitHub

# ── Variables de entorno globales ────────────────────────────────────────────
env:
  TELEGRAM_PREFIX: |          # Prefijo reutilizado en todas las notificaciones
    🏷 *${{ github.repository }}*
    🌿 Rama: \`${{ github.ref_name }}\`
    📝 \`${{ github.event.head_commit.message || 'N/A' }}\`
    👤 Autor: ${{ github.actor }}
    🔗 [Ver commit](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

jobs:
  # ── Job 1: Lint (ESLint backend + frontend) ──────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npx eslint . 2>&1 | tee lint-backend.log
      - run: cd frontend && npm ci
      - run: cd frontend && npx eslint src/ 2>&1 | tee lint-frontend.log
      # Notifica por Telegram que el lint pasó
      - name: Notify lint result
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            ✅ *Lint completado*
            📁 backend: `eslint .`
            📁 frontend: `eslint src/`
            Sin errores de lint.
            📌 Siguiente: Tests backend + frontend + CodeQL

  # ── Job 2: Tests Backend (Jest + Supertest + mongodb-memory-server) ──────
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd backend && npm ci
      - run: cd backend && npm test -- --coverage 2>&1 | tee test-backend.log
      # Guarda reporte de cobertura como artefacto para SonarCloud
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: backend/coverage/
      - name: Notify backend test result
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            ✅ *Tests Backend OK*
            📦 Suites: `{{ steps.test-results.outputs.suites }}`
            📊 Cobertura global
            📌 Siguiente: Frontend tests + CodeQL

  # ── Job 3: Tests Frontend (Vitest + jsdom) ───────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd frontend && npm ci
      - run: cd frontend && npm test 2>&1 | tee test-frontend.log
      # Guarda reporte de cobertura como artefacto para SonarCloud
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/
      - name: Notify frontend test result
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            ✅ *Tests Frontend OK*
            📦 Tests: todos pasaron
            📌 Siguiente: CodeQL y SonarCloud (solo en test)

  # ── Job 4: SonarCloud (solo en rama test) ────────────────────────────────
  sonarcloud:
    if: github.ref_name == 'test'       # Solo se ejecuta en test
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Descarga los artefactos de cobertura generados en jobs anteriores
      - uses: actions/download-artifact@v4
        with:
          name: coverage-backend
          path: backend/coverage/
      - uses: actions/download-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/
      # Corrige rutas en lcov.info para que SonarCloud las interprete correctamente
      - name: Fix lcov paths for SonarCloud
        run: |
          sed -i 's|^SF:|SF:backend/|' backend/coverage/lcov.info
          sed -i 's|^SF:|SF:frontend/|' frontend/coverage/lcov.info
      - uses: sonarsource/sonarcloud-github-action@master
        with:
          qualityGateWait: true          # Espera a que el Quality Gate pase
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # Consulta métricas de SonarCloud vía API para incluirlas en la notificación
      - name: Fetch SonarCloud metrics
        id: sonar-metrics
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/measures/component?component=KevinColoma_RM-Restaurant&metricKeys=alert_status,coverage,bugs,code_smells,vulnerabilities,security_hotspots" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          measures = {m['metric']: m['value'] for m in d.get('component',{}).get('measures',[])}
          qg = '✅ Passed' if measures.get('alert_status') == 'OK' else '❌ Failed'
          print(f'SONAR_QG={qg}')
          print(f'SONAR_COV={measures.get(\"coverage\",\"N/A\")}%')
          print(f'SONAR_BUGS={measures.get(\"bugs\",\"?\")}')
          print(f'SONAR_SMELLS={measures.get(\"code_smells\",\"?\")}')
          print(f'SONAR_VULNS={measures.get(\"vulnerabilities\",\"?\")}')
          print(f'SONAR_HOTSPOTS={measures.get(\"security_hotspots\",\"?\")}')
          " >> $GITHUB_ENV
      - name: Notify SonarCloud result
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            ${{ env.SONAR_QG }}
            📈 Coverage: ${{ env.SONAR_COV }}
            🐛 Bugs: ${{ env.SONAR_BUGS }}
            💨 Code Smells: ${{ env.SONAR_SMELLS }}
            🔒 Vulnerabilities: ${{ env.SONAR_VULNS }}
            ⚡ Hotspots: ${{ env.SONAR_HOTSPOTS }}
            ─────────────────────
            🔗 [Ver reporte en SonarCloud](https://sonarcloud.io/project/overview?id=KevinColoma_RM-Restaurant)
            📌 Siguiente: Auto-merge a main + Deploy

  # ── Job 5: CodeQL (GitHub Security Analysis) ─────────────────────────────
  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
      - name: Notify CodeQL result
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            ✅ *CodeQL completado*
            🔒 Análisis de seguridad: sin vulnerabilidades críticas
            📌 Siguiente: ${{ github.ref_name == 'dev' && 'Sync a test' || 'Auto-merge a main + Deploy' }}

  # ── Job 6: Sync dev → test ───────────────────────────────────────────────
  sync-to-test:
    if: success() && github.ref_name == 'dev'   # Solo en dev y si todo OK
    needs: [lint, test-backend, test-frontend, codeql]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Promueve el código de dev a test
      - name: Push to test
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git push origin HEAD:test
      # Dispara el pipeline en test para validación final con SonarCloud
      - name: Trigger CI on test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run ci-pr.yml --ref test
      - name: Notify sync to test
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            🔄 *Sync: dev → test*
            Código promovido de \`dev\` a \`test\`
            Se disparó CI en \`test\` para validación final.
            📌 Pendiente: SonarCloud + Auto-merge a main

  # ── Job 7: Auto-merge test → main + Deploy a Render ────────────────────
  auto-merge:
    if: success() && github.ref_name == 'test'   # Solo en test y si todo OK
    needs: [lint, test-backend, test-frontend, sonarcloud, codeql]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Promueve el código de test a main (producción)
      - name: Push test → main
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git push origin HEAD:main
      # Despliega en Render vía API
      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"
      - name: Notify auto-merge and deploy
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            🚀 *Auto-merge + Deploy exitoso*
            📦 \`test\` → \`main\` mergeado
            🌐 Desplegando en Render...
            📌 Siguiente: Notificación de deploy

  # ── Job 8: Notificación de éxito ─────────────────────────────────────────
  notify-success:
    if: success()
    needs: [lint, test-backend, test-frontend, codeql]
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.TELEGRAM_PREFIX }}
            ─────────────────────
            ${{ github.ref_name == 'dev'
            && '🟢 *Pipeline Dev completado exitosamente*
            ✅ Lint · ✅ Tests Backend · ✅ Tests Frontend · ✅ CodeQL
            🔄 Sincronizando a \`test\`...'
            || '🟢 *Pipeline Test completado exitosamente*
            ✅ Lint · ✅ Tests Backend · ✅ Tests Frontend · ✅ SonarCloud · ✅ CodeQL
            🚀 Mergeando a \`main\` + Desplegando en Render...' }}

  # ── Job 9: Notificación de fallo ─────────────────────────────────────────
  notify-failure:
    if: failure()
    needs: [lint, test-backend, test-frontend, codeql]
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ❌ *Pipeline Bloqueado — ${{ github.repository }}*
            🌿 Rama: \`${{ github.ref_name }}\`
            👤 Autor: ${{ github.actor }}
            ─────────────────────
            🔴 El pipeline se detuvo en \`${{ github.ref_name }}\`
            🚫 No se sincroniza a la siguiente fase.
            ─────────────────────
            ⚠️ *Posibles causas:*
            • Error de lint en backend o frontend
            • Tests fallidos
            • CodeQL detectó vulnerabilidades
            ─────────────────────
            👨‍💻 Revisa los logs y corrige antes de reintentar.
            🔗 [Ver workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  # ── Job 10: Notificación de cancelación ──────────────────────────────────
  notify-blocked:
    if: cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ⏹ *Pipeline cancelado — ${{ github.repository }}*
            🌿 Rama: \`${{ github.ref_name }}\`
            👤 Autor: ${{ github.actor }}
            El pipeline fue cancelado manualmente.
